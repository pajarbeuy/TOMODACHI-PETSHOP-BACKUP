services:
  nginx:
    image: nginx:alpine
    container_name: tomodachi_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - flutter_web:/var/www/flutter:ro
      - laravel_app:/var/www/laravel:ro
    depends_on:
      - laravel
    networks:
      - tomodachi_net
    restart: unless-stopped

  laravel:
    image: ${BACKEND_IMAGE:-tomodachi-backend:local}
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: tomodachi_laravel
    volumes:
      - laravel_app:/var/www/laravel
      - ./.env.laravel:/var/www/laravel/.env:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tomodachi_net
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  mysql:
    image: mysql:8.0
    container_name: tomodachi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tomodachi_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  flutter_builder:
    image: ${FRONTEND_IMAGE:-tomodachi-frontend:local}
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: tomodachi_flutter_build
    volumes:
      - flutter_web:/output
    profiles:
      - build

volumes:
  mysql_data:
  laravel_app:
  flutter_web:

networks:
  tomodachi_net:
    driver: bridge
