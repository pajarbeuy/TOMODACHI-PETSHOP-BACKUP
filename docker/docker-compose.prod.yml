services:
  nginx:
    image: nginx:alpine
    container_name: tomodachi_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/conf.d/finnaberry.conf:/etc/nginx/conf.d/finnaberry.conf:ro
      - laravel_public:/var/www/laravel/public:ro
      - laravel_public_storage:/var/www/laravel/storage/app/public:ro
    depends_on:
      - laravel
    networks:
      - tomodachi_net
    restart: unless-stopped

  laravel:
    image: ${BACKEND_IMAGE:-tomodachi-backend:local}
    container_name: tomodachi_laravel
    volumes:
      - ./.env.laravel:/var/www/laravel/.env:ro
      - laravel_public:/var/www/laravel/public
      - laravel_public_storage:/var/www/laravel/storage/app/public
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tomodachi_net
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

  mysql:
    image: mysql:8.0
    container_name: tomodachi_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tomodachi_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backup MySQL otomatis setiap 24 jam ──────────────────────────────────
  mysql_backup:
    image: mysql:8.0
    container_name: tomodachi_mysql_backup
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-7}
    volumes:
      - mysql_backups:/backups
      - ./backup.sh:/backup.sh:ro
    networks:
      - tomodachi_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Backup scheduler dimulai. Interval: setiap 24 jam."
        sh /backup.sh
        while true; do
          sleep 86400
          sh /backup.sh
        done

volumes:
  mysql_data:
  mysql_backups:
  laravel_public:
  laravel_public_storage:

networks:
  tomodachi_net:
    driver: bridge
