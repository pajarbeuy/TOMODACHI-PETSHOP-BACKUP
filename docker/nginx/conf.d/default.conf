server {
    listen 80;
    server_name tomodachi-petshop.xyz www.tomodachi-petshop.xyz;
    client_max_body_size 20m;

    # ─── Trusted Proxy (Cloudflare → Nginx → PHP-FPM) ────────
    # Agar Laravel tahu request datang via HTTPS
    set $forwarded_https off;
    if ($http_x_forwarded_proto = "https") {
        set $forwarded_https on;
    }

    # ─── Laravel API (semua request ke PHP-FPM) ───────────────
    location / {
        fastcgi_pass laravel:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/laravel/public/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param DOCUMENT_ROOT   /var/www/laravel/public;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param HTTPS           $forwarded_https;
        fastcgi_pass_request_body on;
        fastcgi_param CONTENT_TYPE   $content_type;
        fastcgi_param CONTENT_LENGTH $content_length;
        fastcgi_read_timeout 60s;
    }

    # ─── Laravel Storage (gambar produk, dll) ─────────────────
    # Dilayani langsung oleh Nginx dari named volume
    location /storage/ {
        alias /var/www/laravel/storage/app/public/;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ─── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ─── Security headers ─────────────────────────────────────
    add_header X-Frame-Options    "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy    "strict-origin-when-cross-origin";
}
