server {
    listen 80;
    server_name localhost;

    # ─── Flutter Web (static files) ───────────────────────
    root /var/www/flutter;
    index index.html;

    # Semua route Flutter pakai index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Laravel API ──────────────────────────────────────
    # Semua request ke /api/* di-proxy ke PHP-FPM
    location ^~ /api/ {
        fastcgi_pass laravel:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/laravel/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/laravel/public;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # ─── Laravel Storage (gambar produk dll) ──────────────
    location /storage {
        alias /var/www/laravel/public/storage;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
}
